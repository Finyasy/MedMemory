name: medmemory-staging

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: medmemory-db-staging
    restart: unless-stopped
    environment:
      POSTGRES_USER: medmemory
      POSTGRES_PASSWORD: medmemory_staging
      POSTGRES_DB: medmemory_staging
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medmemory -d medmemory_staging"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - medmemory-staging

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medmemory-backend-staging
    restart: unless-stopped
    env_file:
      - ./backend/.env.staging
    environment:
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://medmemory:medmemory_staging@db:5432/medmemory_staging
      FRONTEND_BASE_URL: http://localhost:4173
      CORS_ORIGINS: '["http://localhost:4173","http://127.0.0.1:4173"]'
      STARTUP_REQUIRE_EMBEDDINGS: "false"
      PRELOAD_LLM_ON_STARTUP: "0"
    ports:
      - "8001:8000"
    volumes:
      - upload_data_staging:/app/uploads
      - ./backend/models:/app/models:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - medmemory-staging

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: http://localhost:8001
    container_name: medmemory-frontend-staging
    restart: unless-stopped
    ports:
      - "4173:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - medmemory-staging

volumes:
  postgres_data_staging:
    driver: local
  upload_data_staging:
    driver: local

networks:
  medmemory-staging:
    driver: bridge
