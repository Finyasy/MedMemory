services:
  # ============================================
  # PostgreSQL Database with pgvector
  # ============================================
  db:
    image: pgvector/pgvector:pg16
    container_name: medmemory-db-local
    restart: unless-stopped
    command:
      - postgres
      - -c
      - shared_buffers=4GB
      - -c
      - effective_cache_size=12GB
      - -c
      - work_mem=32MB
      - -c
      - maintenance_work_mem=1GB
      - -c
      - random_page_cost=1.1
    environment:
      POSTGRES_USER: medmemory
      POSTGRES_PASSWORD: medmemory_secret
      POSTGRES_DB: medmemory
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medmemory -d medmemory"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - medmemory-network

  # ============================================
  # Frontend Service (React + Nginx)
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medmemory-frontend-local
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - medmemory-network

  speech-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medmemory-speech-local
    restart: unless-stopped
    working_dir: /app
    env_file:
      - ./backend/.env
    environment:
      SPEECH_SYNTHESIS_MODEL_PATH: /app/models/mms-tts-swh
      SPEECH_SYNTHESIS_ASSETS_DIR: /app/artifacts/speech/generated
    ports:
      - "8010:8010"
    volumes:
      - ./backend/models:/app/models:ro
      - ./backend/artifacts:/app/artifacts
    command: uvicorn app.speech_service:app --host 0.0.0.0 --port 8010
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, urllib.request; req = urllib.request.Request('http://localhost:8010/internal/v1/health', headers={'X-Speech-Service-Key': os.getenv('SPEECH_SERVICE_INTERNAL_API_KEY', '')}); urllib.request.urlopen(req)"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - medmemory-network

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data_local:
    driver: local

# ============================================
# Networks
# ============================================
networks:
  medmemory-network:
    driver: bridge
